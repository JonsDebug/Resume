<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap Track — Jonathan Duvall</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #e9e4d8;
            --bg-surface: #f6f3ec;
            --bg-card: #fbf9f4;
            --border-subtle: #dcd6c8;
            --border-medium: #c9c1ad;
            --border-accent: rgba(180, 83, 31, 0.4);
            --text-primary: #201d18;
            --text-secondary: #5c564a;
            --text-muted: #a09884;
            --accent: #b4531f;
            --accent-glow: rgba(180, 83, 31, 0.10);
            --doing: #b07818;
            --doing-glow: rgba(176, 120, 24, 0.14);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            line-height: 1.6;
        }
        ::selection { background: var(--accent); color: var(--bg-surface); }
        a { color: var(--accent); }
        a:hover { color: #8a3c12; }
        .wrap { max-width: 880px; margin: 0 auto; padding: 40px 24px 80px; }
        .crumbs {
            display: flex; gap: 18px; margin-bottom: 32px;
            font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
        }
        .crumbs a { color: var(--text-secondary); text-decoration: none; transition: color 0.2s; }
        .crumbs a:hover { color: var(--accent); }
        .track-head { display: flex; gap: 18px; align-items: flex-start; margin-bottom: 8px; }
        .tk-badge {
            width: 44px; height: 44px; border-radius: 10px; flex: none;
            display: flex; align-items: center; justify-content: center;
            font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 20px; color: #fff;
        }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: -0.3px; line-height: 1.25; }
        .track-focus { color: var(--text-secondary); font-size: 14px; margin-top: 2px; }
        .track-meta {
            font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
            color: var(--text-muted); margin-top: 6px;
        }
        .track-bar { height: 8px; border-radius: 0; background: #ded7c6; overflow: hidden; display: flex; margin: 22px 0 6px; }
        .track-bar i { display: block; height: 100%; }
        .b-done { background: var(--accent); }
        .b-doing { background: var(--doing); }
        .track-legend { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-bottom: 34px; }
        .step-card {
            background: var(--bg-card); border: 1px solid var(--border-subtle);
            border-radius: 0; padding: 24px 28px; margin-bottom: 16px;
        }
        .step-top { display: flex; align-items: flex-start; gap: 14px; flex-wrap: wrap; }
        .step-id {
            font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
            color: var(--accent); background: var(--accent-glow);
            padding: 4px 10px; border-radius: 4px; margin-top: 2px;
        }
        .step-title { font-family: 'Space Grotesk', sans-serif; font-size: 17px; font-weight: 600; flex: 1; min-width: 200px; }
        .step-time { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 5px; }
        .status-pill {
            font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
            border-radius: 999px; padding: 5px 14px; cursor: pointer;
            border: 1px solid var(--border-medium); background: transparent; color: var(--text-secondary);
            transition: all 0.15s; letter-spacing: 0.5px;
        }
        .status-pill.doing { color: var(--doing); border-color: var(--doing); background: var(--doing-glow); }
        .status-pill.done { color: var(--accent); border-color: var(--accent); background: var(--accent-glow); }
        .status-pill:hover { border-color: var(--accent); }
        .step-why { color: var(--text-secondary); font-size: 13.5px; margin-top: 12px; }
        .step-note {
            margin-top: 12px; font-size: 13px; color: var(--text-secondary);
            border-left: 2px solid var(--border-accent); padding: 4px 0 4px 14px;
        }
        .sub-label {
            font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--text-muted);
            letter-spacing: 1.5px; text-transform: uppercase;
            margin: 20px 0 10px; display: flex; align-items: center; gap: 12px;
        }
        .sub-label::after { content: ''; flex: 1; height: 1px; background: var(--border-subtle); }
        .mod-progress { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .mod-progress .track-bar { flex: 1; margin: 0; height: 5px; }
        .mod-progress span { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-secondary); white-space: nowrap; }
        .check-item {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 8px 10px; margin: 0 -10px; border-radius: 6px;
            transition: background 0.15s;
        }
        .check-item:hover { background: rgba(0,0,0,0.035); }
        .check-item input {
            appearance: none; width: 17px; height: 17px; flex: none; margin-top: 4px;
            border: 1.5px solid var(--border-accent); border-radius: 4px;
            background: transparent; cursor: pointer; position: relative; transition: all 0.15s;
        }
        .check-item input:checked { background: var(--accent); border-color: var(--accent); }
        .check-item input:checked::after {
            content: '✓'; position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700; color: #fff;
        }
        .check-body { flex: 1; font-size: 13.5px; }
        .check-body a { text-decoration: none; color: var(--text-primary); transition: color 0.15s; }
        .check-body a:hover { color: var(--accent); }
        .check-item.done .check-body a { color: var(--text-muted); text-decoration: line-through; }
        .check-meta { display: inline-flex; gap: 8px; margin-left: 8px; vertical-align: middle; }
        .type-tag {
            font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
            color: var(--text-muted); border: 1px solid var(--border-medium);
            border-radius: 4px; padding: 1px 6px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .type-tag.superbadge { color: var(--doing); border-color: var(--doing); }
        .check-time { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); }
        .req-badge {
            font-family: 'JetBrains Mono', monospace; font-size: 9.5px; font-weight: 700;
            color: #fff; background: var(--doing); border-radius: 4px; padding: 1px 6px;
        }
        .res-note { font-size: 13px; color: var(--text-muted); font-style: italic; padding: 8px 0; }
        .empty { color: var(--text-muted); font-size: 14px; font-style: italic; padding: 40px 0; text-align: center; }
        .foot {
            margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border-subtle);
            font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted);
        }
        .other-tracks { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
        .other-tracks a {
            display: inline-flex; align-items: center; gap: 8px;
            font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-secondary);
            text-decoration: none; border: 1px solid var(--border-subtle); border-radius: 999px;
            padding: 5px 14px 5px 7px; transition: all 0.15s;
        }
        .other-tracks a:hover { border-color: var(--accent); color: var(--accent); }
        .other-tracks .n {
            width: 20px; height: 20px; border-radius: 6px; color: #fff;
            display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 10.5px;
        }
        @media (max-width: 600px) {
            .step-card { padding: 18px 18px; }
            .check-meta { display: block; margin: 4px 0 0; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <nav class="crumbs">
            <a href="index.html">← Spec sheet</a>
            <a href="index.html#roadmap">§06 Trajectory</a>
            <a href="roadmap.html">Full roadmap board ↗</a>
        </nav>
        <div id="app"><div class="empty">Loading track…</div></div>
        <div class="foot">
            <div>Check-offs save locally and stay in sync with the full roadmap board.</div>
            <div class="other-tracks" id="other-tracks"></div>
        </div>
    </div>
    <script src="roadmap-track-data.js"></script>
    <script>
        (function () {
            const D = window.ROADMAP_FULL;
            const TRACK_COLORS = { A: '#4356d6', B: '#8a4fd6', C: '#c04f86', D: '#1f8a70', E: '#4a6b8a', L: '#b5652a', S: '#5f8f4e' };
            const PROGRESS_KEY = 'salesforce-roadmap-progress-v2';
            const RES_KEY = 'salesforce-roadmap-resources-v2';
            const esc = s => String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
            const load = (k) => { try { return JSON.parse(localStorage.getItem(k)) || {}; } catch (e) { return {}; } };
            const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} };

            const params = new URLSearchParams(location.search);
            const req = params.get('track');
            const key = D.TRACKS.some(t => t.key === req) ? req : D.TRACKS[0].key;
            const ti = D.TRACKS.findIndex(t => t.key === key);
            const track = D.TRACKS[ti];
            const app = document.getElementById('app');
            if (!track) { app.innerHTML = '<div class="empty">Track not found.</div>'; return; }
            const num = ti + 1;
            const color = TRACK_COLORS[key] || '#5eead4';
            const steps = D.STEPS.filter(s => s.track === key);
            document.title = num + ' — ' + track.name + ' · Roadmap';

            let progress = load(PROGRESS_KEY);
            let resDone = load(RES_KEY);
            const st = id => progress[id] || 'todo';
            const CYCLE = { todo: 'doing', doing: 'done', done: 'todo' };
            const PILL = { todo: 'NOT STARTED', doing: 'IN PROGRESS', done: 'DONE ✓' };
            const rk = (id, u) => id + '::' + u;

            function checkItem(stepId, url, label, metaHtml) {
                const done = resDone[rk(stepId, url)] === true;
                return '<label class="check-item' + (done ? ' done' : '') + '">' +
                    '<input type="checkbox" data-res="' + esc(stepId) + '" data-url="' + esc(url) + '"' + (done ? ' checked' : '') + '>' +
                    '<span class="check-body"><a href="' + esc(url) + '" target="_blank" rel="noopener">' + label + '</a>' +
                    (metaHtml ? '<span class="check-meta">' + metaHtml + '</span>' : '') + '</span></label>';
            }

            function render() {
                progress = load(PROGRESS_KEY);
                resDone = load(RES_KEY);
                const done = steps.filter(s => st(s.id) === 'done').length;
                const doing = steps.filter(s => st(s.id) === 'doing').length;
                let html =
                    '<header class="track-head">' +
                    '<div class="tk-badge" style="background:' + color + '">' + num + '</div>' +
                    '<div><h1>' + esc(track.name) + '</h1>' +
                    '<div class="track-focus">' + esc(track.focus) + '</div>' +
                    '<div class="track-meta">' + esc(track.weeks) + (track.optional ? ' · OPTIONAL TRACK' : '') + '</div></div></header>' +
                    '<div class="track-bar"><i class="b-done" style="width:' + (steps.length ? done / steps.length * 100 : 0) + '%"></i>' +
                    '<i class="b-doing" style="width:' + (steps.length ? doing / steps.length * 100 : 0) + '%"></i></div>' +
                    '<div class="track-legend">' + done + ' of ' + steps.length + ' steps done · ' + doing + ' in progress</div>';

                steps.forEach((s, si) => {
                    const status = st(s.id);
                    const mods = D.MODULES[s.id] || [];
                    const modsDone = mods.filter(m => resDone[rk(s.id, m.u)] === true).length;
                    html += '<article class="step-card">' +
                        '<div class="step-top">' +
                        '<span class="step-id">' + num + '.' + (si + 1) + '</span>' +
                        '<h2 class="step-title">' + esc(s.title) + '</h2>' +
                        '<span class="step-time">' + esc(s.time || '') + '</span>' +
                        '<button class="status-pill ' + status + '" data-step="' + esc(s.id) + '">' + PILL[status] + '</button>' +
                        '</div>';
                    if (s.why) html += '<p class="step-why">' + esc(s.why) + '</p>';
                    if (s.note) html += '<div class="step-note">' + esc(s.note) + '</div>';
                    if (mods.length) {
                        html += '<div class="sub-label">Trailhead modules — check off as you go</div>' +
                            '<div class="mod-progress"><div class="track-bar"><i class="b-done" style="width:' + (modsDone / mods.length * 100) + '%"></i></div>' +
                            '<span>' + modsDone + '/' + mods.length + '</span></div>';
                        mods.forEach(m => {
                            const meta = '<span class="type-tag' + (m.y === 'superbadge' ? ' superbadge' : '') + '">' + esc(m.y) + '</span>' +
                                (m.tm ? '<span class="check-time">' + esc(m.tm) + '</span>' : '') +
                                (m.req ? '<span class="req-badge">REQUIRED</span>' : '');
                            html += checkItem(s.id, m.u, esc(m.t), meta);
                        });
                    }
                    const res = s.resources || [];
                    if (res.length) {
                        html += '<div class="sub-label">Learning resources</div>';
                        res.forEach(r => {
                            if (r.url) html += checkItem(s.id, r.url, esc(r.label) + ' ↗', '');
                            else if (r.note) html += '<div class="res-note">' + esc(r.note) + '</div>';
                        });
                    }
                    html += '</article>';
                });
                app.innerHTML = html;

                app.querySelectorAll('.status-pill').forEach(b => b.addEventListener('click', () => {
                    const id = b.dataset.step;
                    const next = CYCLE[st(id)];
                    if (next === 'todo') delete progress[id]; else progress[id] = next;
                    save(PROGRESS_KEY, progress);
                    render();
                }));
                app.querySelectorAll('input[data-res]').forEach(cb => cb.addEventListener('change', () => {
                    const k = rk(cb.dataset.res, cb.dataset.url);
                    if (cb.checked) resDone[k] = true; else delete resDone[k];
                    save(RES_KEY, resDone);
                    render();
                }));
            }
            render();
            window.addEventListener('storage', e => { if (e.key === PROGRESS_KEY || e.key === RES_KEY) render(); });

            document.getElementById('other-tracks').innerHTML = D.TRACKS.map((t, i) =>
                i === ti ? '' :
                '<a href="track.html?track=' + encodeURIComponent(t.key) + '"><span class="n" style="background:' + (TRACK_COLORS[t.key] || '#5eead4') + '">' + (i + 1) + '</span>' + esc(t.name) + '</a>'
            ).join('');
        })();
    </script>
</body>
</html>
